[registry]
name = "cloudlab-c6620-9"
description = "CloudLab c6620 fixed topology: node-0 source plus node-1..node-8 getters."

[[instances]]
id = "node-0"
rpc_addr = "node-0:19000"
p2p_advertise_endpoint = "http://node-0:18080"
work_dir = ".bench/instances/node-0"
capabilities = ["p2p", "source", "holder"]

[[instances]]
id = "node-1"
rpc_addr = "node-1:19000"
p2p_advertise_endpoint = "http://node-1:18080"
work_dir = ".bench/instances/node-1"
capabilities = ["p2p", "getter"]

