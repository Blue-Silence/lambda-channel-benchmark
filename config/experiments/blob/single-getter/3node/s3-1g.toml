[run]
run_id = "blob-single-getter-3node-s3-1g"
workload = "blob.single_getter"
description = "Measure S3 single-getter materialize throughput for 1g objects with one getter plus two putters."
output_dir = "out/blob-single-getter-3node-s3-1g"
seed = 1

[coordination]
rpc_timeout_ms = 60000
barrier_timeout_ms = 3600000
cleanup_timeout_ms = 30000
force_reset_on_start = true

[benchmark]
backend = "s3"
operations = 1
concurrency = 32
object_size_bytes = 1073741824
warmup_operations = 0
duration_seconds = 120
repetitions = 1

[throughput_sweep]
points_ops_per_s = [1, 2, 4, 8, 16]

[lambda_channel]
metadata_backend = "inmemory"
channel_id_prefix = "lcbench-blob-single-getter-3node-s3-1g"
consume_mode = "competitive"

[p2p]
tracker_backend = "dynamodb"
cache_root = ".bench/cache"
chunk_server_bind_host = "0.0.0.0"
chunk_server_port_base = 18080
chunk_server_runtime_worker_threads = 4
enable_accel = true
accel_probability = 0.9
persist_backend = "none"
non_abortable_task_workers = 16

[env]
LC_BENCH_S3_BUCKET_PREFIX = "lcbench-blob-singleget"
LC_BENCH_S3_KEY_PREFIX = "blob-single-getter-3node-s3-1g"
LC_BENCH_BLOB_SINGLE_GETTER_PRELOAD_CONCURRENCY = "8"

[[participants]]
instance_id = "node-0"
label = "getter"

[[participants]]
instance_id = "node-1"
label = "putter"

[[participants]]
instance_id = "node-2"
label = "putter"
