[run]
run_id = "blob-p2p-local-hit"
workload = "blob.p2p_local_hit"
description = "Materialize P2P blob refs when chunks are already local."
output_dir = "out/blob-p2p-local-hit"
seed = 1

[coordination]
rpc_timeout_ms = 5000
barrier_timeout_ms = 30000
cleanup_timeout_ms = 10000
force_reset_on_start = true

[benchmark]
backend = "p2p"
operations = 10
concurrency = 1
object_size_bytes = 65536
warmup_operations = 2
repetitions = 1

[lambda_channel]
metadata_backend = "inmemory"
channel_id_prefix = "lcbench-p2p-local-hit"
consume_mode = "competitive"

[p2p]
tracker_backend = "dynamodb"
cache_root = ".bench/cache"
chunk_server_bind_host = "127.0.0.1"
chunk_server_port_base = 18080
chunk_server_runtime_worker_threads = 4
enable_accel = true
accel_probability = 0.9
persist_backend = "none"
non_abortable_task_workers = 16

[[participants]]
instance_id = "local-a"
label = "worker"
