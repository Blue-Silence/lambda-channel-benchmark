[run]
run_id = "blob-multi-getter-smoke-3node-s3-32b"
workload = "blob.multi_getter"
description = "Smoke test aggregate S3 multi-getter read throughput on one source plus two getters."
output_dir = "out/blob-multi-getter-smoke-3node-s3-32b"
seed = 1

[coordination]
rpc_timeout_ms = 5000
barrier_timeout_ms = 120000
cleanup_timeout_ms = 30000
force_reset_on_start = true

[benchmark]
backend = "s3"
operations = 1
concurrency = 8
object_size_bytes = 32
warmup_operations = 0
duration_seconds = 5
repetitions = 1

[throughput_sweep]
points_ops_per_s = [8.0]

[lambda_channel]
metadata_backend = "inmemory"
channel_id_prefix = "lcbench-blob-multiget-smoke-s3-32b"
consume_mode = "competitive"

[p2p]
tracker_backend = "dynamodb"
cache_root = ".bench/cache"
chunk_server_bind_host = "0.0.0.0"
chunk_server_port_base = 18080
chunk_server_runtime_worker_threads = 4
enable_accel = true
accel_probability = 0.9
persist_backend = "none"
non_abortable_task_workers = 16

[env]
LC_BENCH_S3_BUCKET_PREFIX = "lcbench-blob-multiget"
LC_BENCH_S3_KEY_PREFIX = "blob-multi-getter-smoke-3node-s3-32b"

[[participants]]
instance_id = "node-0"
label = "source"

[[participants]]
instance_id = "node-1"
label = "getter"

[[participants]]
instance_id = "node-2"
label = "getter"

