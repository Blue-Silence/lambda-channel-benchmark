[run]
run_id = "blob-multi-getter-p2p-128m"
workload = "blob.multi_getter"
description = "Measure aggregate P2P multi-getter read throughput for 128MiB objects."
output_dir = "out/blob-multi-getter-p2p-128m"
seed = 1

[coordination]
rpc_timeout_ms = 60000
barrier_timeout_ms = 1200000
cleanup_timeout_ms = 30000
force_reset_on_start = true

[benchmark]
backend = "p2p"
operations = 1
concurrency = 16
object_size_bytes = 134217728
warmup_operations = 0
duration_seconds = 60
repetitions = 1

[throughput_sweep]
points_ops_per_s = [1, 2, 4, 8, 16, 32, 64]

[lambda_channel]
metadata_backend = "inmemory"
channel_id_prefix = "lcbench-blob-multi-getter-p2p-128m"
consume_mode = "competitive"

[p2p]
tracker_backend = "dynamodb"
cache_root = ".bench/cache"
chunk_server_bind_host = "0.0.0.0"
chunk_server_port_base = 18080
chunk_server_runtime_worker_threads = 4
enable_accel = true
accel_probability = 0.9
persist_backend = "none"
non_abortable_task_workers = 16

[env]
LC_BENCH_P2P_TRACKER_TABLE_META_PREFIX = "lcbench_blob_multiget_meta"
LC_BENCH_P2P_TRACKER_TABLE_HOLDERS_PREFIX = "lcbench_blob_multiget_holders"
LC_BENCH_P2P_CREATE_TRACKER_TABLES = "true"

[[participants]]
instance_id = "node-0"
label = "source"

[[participants]]
instance_id = "node-1"
label = "getter"

[[participants]]
instance_id = "node-2"
label = "getter"

[[participants]]
instance_id = "node-3"
label = "getter"

[[participants]]
instance_id = "node-4"
label = "getter"

[[participants]]
instance_id = "node-5"
label = "getter"

[[participants]]
instance_id = "node-6"
label = "getter"

[[participants]]
instance_id = "node-7"
label = "getter"

[[participants]]
instance_id = "node-8"
label = "getter"
