[run]
run_id = "blob-multi-getter-s3-16m"
workload = "blob.multi_getter"
description = "Measure aggregate S3 multi-getter read throughput for 16MiB objects."
output_dir = "out/blob-multi-getter-s3-16m"
seed = 1

[coordination]
rpc_timeout_ms = 60000
barrier_timeout_ms = 600000
cleanup_timeout_ms = 30000
force_reset_on_start = true

[benchmark]
backend = "s3"
operations = 1
concurrency = 8192
object_size_bytes = 16777216
warmup_operations = 0
duration_seconds = 10
repetitions = 1

[throughput_sweep]
start_ops_per_s = 40
max_points = 20

[lambda_channel]
metadata_backend = "inmemory"
channel_id_prefix = "lcbench-blob-multi-getter-s3-16m"
consume_mode = "competitive"

[p2p]
tracker_backend = "dynamodb"
cache_root = ".bench/cache"
chunk_server_bind_host = "0.0.0.0"
chunk_server_port_base = 18080
chunk_server_runtime_worker_threads = 4
enable_accel = true
accel_probability = 0.9
persist_backend = "none"
non_abortable_task_workers = 16

[env]
LC_BENCH_S3_BUCKET_PREFIX = "lcbench-blob-multiget"
LC_BENCH_S3_KEY_PREFIX = "blob-multi-getter-s3-16m"
LC_BENCH_BLOB_MULTI_GETTER_PRELOAD_CONCURRENCY = "16"

[[participants]]
instance_id = "node-0"
label = "source"

[[participants]]
instance_id = "node-1"
label = "getter"

[[participants]]
instance_id = "node-2"
label = "getter"

[[participants]]
instance_id = "node-3"
label = "getter"

[[participants]]
instance_id = "node-4"
label = "getter"

[[participants]]
instance_id = "node-5"
label = "getter"

[[participants]]
instance_id = "node-6"
label = "getter"

[[participants]]
instance_id = "node-7"
label = "getter"

[[participants]]
instance_id = "node-8"
label = "getter"
