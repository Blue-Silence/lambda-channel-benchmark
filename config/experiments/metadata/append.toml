[run]
run_id = "metadata-append-dynamodb"
workload = "metadata.append"
description = "Measure DynamoDB metadata append throughput-latency sweep."
output_dir = "out/metadata-append-dynamodb"
seed = 1

[coordination]
rpc_timeout_ms = 5000
barrier_timeout_ms = 30000
cleanup_timeout_ms = 10000
force_reset_on_start = true

[benchmark]
operations = 1000
duration_seconds = 10.0
concurrency = 64
object_size_bytes = 32
warmup_operations = 100
repetitions = 1

[throughput_sweep]
start_ops_per_s = 100.0
step_multiplier = 2.0
max_ops_per_s = 20000.0
max_points = 8
saturation_achieved_ratio = 0.5
stop_on_failure = true

[lambda_channel]
metadata_backend = "dynamodb"
channel_id_prefix = "lcbench-metadata-append"
consume_mode = "competitive"

[p2p]
tracker_backend = "none"
cache_root = ".bench/cache"
chunk_server_bind_host = "127.0.0.1"
chunk_server_port_base = 18080
chunk_server_runtime_worker_threads = 4
enable_accel = true
accel_probability = 0.9
persist_backend = "none"
non_abortable_task_workers = 16

[env]
AWS_REGION = "us-west-2"
LC_BENCH_METADATA_TABLE_PREFIX = "lcbench-metadata-append"
LC_BENCH_METADATA_CREATE_TABLE = "true"
LC_BENCH_METADATA_CLEANUP_TABLE = "true"
