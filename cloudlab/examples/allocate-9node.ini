# CloudLab profile allocation configuration for the fixed 9-node multi-getter workflow.
#
# Copy this file to:
#
#   cloudlab/.config/allocate-9node.ini
#
# Then edit the experiment fields and SSH user for your CloudLab account.

[paths]
nodes_file = cloudlab/.generated/nodes.ini

[portal]
portal_cli = portal-cli
portal_url = https://www.cloudlab.us
token_file = cloudlab/.secrets/cloudlab.jwt

[experiment]
name = lc-9node
project = SimBricks
duration_hours = 4
ssh_user = replace-with-cloudlab-username
ssh_pubkey =

[profile]
name = LambdaChannel-9node
project = SimBricks

[poll]
timeout_sec = 2700
poll_sec = 30
