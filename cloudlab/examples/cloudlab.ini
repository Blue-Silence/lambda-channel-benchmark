# CloudLab local deployment configuration.
#
# Copy this file to:
#
#   cloudlab/.config/cloudlab.ini
#
# Then edit it for your local environment.
#
# Do not commit cloudlab/.config/.
#
# This config intentionally does NOT contain allocation/topology settings.
# Allocation is handled by cloudlab/scripts/entrypoints/allocate_profile.py using command-line arguments
# and a CloudLab profile that already exists in the web UI.

[paths]
nodes_file = cloudlab/.generated/nodes.ini
package_file = cloudlab/.generated/package/source-bundle.tar.gz
package_manifest = cloudlab/.generated/package/manifest.ini
local_log_dir = cloudlab/.generated/logs
results_dir = cloudlab/results

[package]
benchmark_repo = https://github.com/Blue-Silence/lambda-channel-benchmark.git
benchmark_ref = main

p2p_repo = https://github.com/Blue-Silence/p2p-data-transfer.git
p2p_ref = rust-accr

work_dir = cloudlab/.generated/package/work
clean_work = true

[deploy]
# Leave empty if your ~/.ssh/config or ssh-agent already works.
ssh_key =

remote_tmp_dir = /tmp/cloudlab-deploy
remote_repo_dir = /local/cloudlab-workspace
remote_build_log = /local/cloudlab-build.log

clean_remote = true
skip_apt = false

parallel = true
max_workers =
connect_timeout = 30

[runtime]
# Path to the built binary on each CloudLab node. Usually only change this if
# [deploy] remote_repo_dir changes.
remote_binary = /local/cloudlab-workspace/target/release/lc-bench

# Instance inventory used by `lc-bench node --instances`.
# Change this when switching CloudLab topology/profile or experiment topology.
# The instance ids in this TOML must match the remote node hostnames, because
# the node daemon infers its own instance id from hostname by default.
# This file must already exist inside the deployed source bundle.
# For one-node CloudLab experiments, use:
# remote_instances_file = /local/cloudlab-workspace/config/instances/single-node.toml
remote_instances_file = /local/cloudlab-workspace/config/instances/local-two.toml

# Remote process bookkeeping for start_expr_servers.py / kill_expr_servers.py.
remote_pid_file = /local/lc-bench-node.pid
remote_expr_log = /local/lc-bench-node.log

# Set false if you want start_expr_servers.py to leave an existing daemon alone.
restart = true

# kill_expr_servers.py uses the pid file first, then this fallback pattern.
kill_fallback_pattern = lc-bench node

# Optional dotenv-style file with AWS credentials for the remote daemon.
# Copy cloudlab/examples/aws.env.example to this path and fill it locally.
# Values from env.NAME entries below override values from this file.
aws_env_file = cloudlab/.config/aws.env

# Optional environment variables for the remote `lc-bench node` daemon.
#
# Local proxy runs do not need AWS credentials for S3/DynamoDB datapaths. The
# CloudLab node daemon does, because it performs the measured S3/DynamoDB work.
#
# Blob S3/P2P and metadata DynamoDB experiments use AWS managed services by
# default in us-west-2. Prefer an instance role when available. Otherwise fill
# cloudlab/.config/aws.env locally. Never commit real keys or session tokens.
# env.AWS_REGION = us-west-2
# env.AWS_DEFAULT_REGION = us-west-2
#
# AWS_PROFILE only works if the matching ~/.aws/config and ~/.aws/credentials
# files also exist on the CloudLab node.
# env.AWS_PROFILE = <remote-profile-name>
