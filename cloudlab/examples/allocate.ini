# CloudLab profile allocation configuration.
#
# Copy this file to:
#
#   cloudlab/.config/allocate.ini
#
# Then edit it for your CloudLab profile.
#
# Do NOT commit cloudlab/.config/.
#
# Authentication:
#   Put your CloudLab portal token in cloudlab/.secrets/cloudlab.jwt.
#   The scripts read that file and pass it to portal-cli as PORTAL_TOKEN.

[paths]
nodes_file = cloudlab/.generated/nodes.ini

[portal]
portal_cli = portal-cli
# Portal API endpoint. This is not the CloudLab web UI URL.
portal_url = https://www.emulab.net:43794
token_file = cloudlab/.secrets/cloudlab.jwt

[experiment]
name = lc-test
project = SimBricks
duration_hours = 4

# Optional existing experiment id/name used by refresh_nodes.py.
# Leave empty to reuse [experiment] name.
experiment_id =

# SSH username written into nodes.ini.
# This is the user cloudlab/scripts/entrypoints/deploy.py will use to connect to nodes.
ssh_user = replace-with-cloudlab-username

# Optional extra SSH public key to pass to CloudLab.
# Leave empty if your CloudLab account already has the key registered.
ssh_pubkey =

[profile]
name = replace-with-profile-name
project = SimBricks

[poll]
timeout_sec = 2700
poll_sec = 30
